name: study_anything
description: "Study anything with AI — summaries, quizzes & more."


version: 1.0.0+2

environment:
  sdk: ^3.11.5

dependencies:
  flutter:
    sdk: flutter

  cupertino_icons: ^1.0.8
  
  # Firebase
  firebase_core: ^4.7.0
  firebase_auth: ^6.4.0
  cloud_firestore: ^6.3.0
  google_sign_in: ^7.2.0
  
  # Networking & Ads
  http: ^1.2.0
  google_mobile_ads: ^8.0.0

  # PDF
  file_picker: ^11.0.2
  syncfusion_flutter_pdf: ^33.2.4


  # State Management & Navigation
  flutter_riverpod: ^3.3.1
  go_router: ^17.2.2

  # Env
  flutter_dotenv: ^6.0.1
  # UI
  lottie: ^3.1.2
  fl_chart: ^1.2.0
  google_fonts: ^8.1.0

  # Storage
  hive_flutter: ^1.1.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0
  flutter_launcher_icons: ^0.14.4

# App Icon Configuration (Root-level)
flutter_launcher_icons:
  android: "launcher_icon"
  ios: true
  image_path: "assets/images/app_icon.png"
  min_sdk_android: 21

flutter:
  uses-material-design: true

  assets:
    - .env
    - assets/fonts/
    - assets/images/

  fonts:
    - family: Poppins
      fonts:
        - asset: assets/fonts/Poppins-Regular.ttf
        - asset: assets/fonts/Poppins-Medium.ttf
          weight: 500
        - asset: assets/fonts/Poppins-SemiBold.ttf
          weight: 600
        - asset: assets/fonts/Poppins-Bold.ttf
          weight: 700